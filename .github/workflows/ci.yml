name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask boto3

      - name: Check Python syntax
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: CI success message
        run: echo "CI completed successfully"

  cd:
    name: Continuous Deployment
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r lambda-deployment.zip . -x ".git/*" ".github/*" "__pycache__/*" "*.pyc"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name YOUR_LAMBDA_FUNCTION_NAME \
            --zip-file fileb://lambda-deployment.zip

      - name: Wait for Lambda update to finish
        run: |
          aws lambda wait function-updated \
            --function-name YOUR_LAMBDA_FUNCTION_NAME

      - name: CD success message
        run: echo "Deployment to Lambda completed successfully"
